syntax = "proto3";
package kratos.api;

option go_package = "internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Auth auth = 3;
  Log log = 4;
  Job job = 5;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
    bool auto_migrate = 3;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
    google.protobuf.Duration dial_timeout = 5;
    string password = 6;
    int32 db = 7;
  }
  Database database = 1;
  Redis redis = 2;
}

message Auth {
  string private_key_path = 1;
  google.protobuf.Duration access_token_ttl = 2;
  google.protobuf.Duration refresh_token_ttl = 3;
}

message Log {
  message Rotate {
    int32 max_size = 1;
    int32 max_backups = 2;
    int32 max_age = 3;
    bool compress = 4;
  }
  string level = 1;
  string filepath = 2;
  Rotate rotate = 3;
}

message Job {
  bool enabled = 1;
  string queue = 2;
  int32 worker_concurrency = 3;
  google.protobuf.Duration task_timeout = 4;
  google.protobuf.Duration shutdown_timeout = 5;
}
