syntax = "proto3";

package todo.v1;

option go_package = "api/todo/v1;v1";
option java_multiple_files = true;
option java_package = "todo.v1";
option objc_class_prefix = "APITodoV1";

// ErrorReason defines stable todo error reason codes.
enum ErrorReason {
  // Default value for unknown todo errors.
  TODO_UNSPECIFIED = 0;
  // The requested todo item does not exist.
  TODO_NOT_FOUND = 1;
  // The todo request payload or arguments are invalid.
  TODO_INVALID_ARGUMENT = 2;
}
