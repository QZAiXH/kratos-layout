syntax = "proto3";

package todo.v1;

import "errors/errors.proto";

option go_package = "api/todo/v1;v1";
option java_multiple_files = true;
option java_package = "todo.v1";
option objc_class_prefix = "APITodoV1";

// ErrorReason 定义待办事项接口的稳定错误原因。
enum ErrorReason {
  option (errors.default_code) = 500;

  // 未知错误。
  TODO_UNSPECIFIED = 0 [(errors.code) = 500];
  // 待办事项不存在。
  TODO_NOT_FOUND = 1 [(errors.code) = 404];
  // 待办事项请求参数非法。
  TODO_INVALID_ARGUMENT = 2 [(errors.code) = 400];
}
